<style>
:root{
  --gold:#ffd700;--gold2:#ffaa00;--hot:#ff2d78;--cyan:#00ffe7;
  --green:#39ff14;--amber:#ffb300;--blue:#4488ff;--purple:#bf5fff;
  --bg:#06030a;--panel:#0e0914;--chrome:#160f1e;--border:#241830;--dim:#6a5878;
}
*{box-sizing:border-box;margin:0;padding:0}
html{overflow-y:auto;height:100%}
body{background:var(--bg);font-family:'Share Tech Mono',monospace;color:#fff;min-height:100vh;
  background-image:radial-gradient(ellipse 100% 60% at 50% -10%,rgba(255,45,120,.09) 0%,transparent 60%),radial-gradient(ellipse 60% 40% at 80% 80%,rgba(0,255,231,.04) 0%,transparent 60%)}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:9000;
  background:repeating-linear-gradient(0deg,rgba(0,0,0,.1) 0px,rgba(0,0,0,.1) 1px,transparent 1px,transparent 3px)}
.edge{position:fixed;top:0;left:0;right:0;height:4px;z-index:9999;
  background:linear-gradient(90deg,var(--hot),var(--gold),var(--cyan),var(--green),var(--gold),var(--hot));
  background-size:200%;animation:edge 3s linear infinite}
@keyframes edge{to{background-position:200%}}
</style>

<!-- ║ CORE FUNCTIONALITY INTEGRATION SCRIPTS                    ║ -->
<!-- ╚════════════════════════════════════════════════════════════╝ -->

<script>
// ═══════════════════════════════════════════════════════════════
// REAL API INTEGRATION MODULE
// ═══════════════════════════════════════════════════════════════

class TradeArenaAPI {
  constructor() {
    this.anthropicKey = localStorage.getItem('ANTHROPIC_API_KEY') || '';
    this.alpacaKey = localStorage.getItem('ALPACA_API_KEY') || '';
    this.priceCache = new Map();
    this.priceCacheExpiry = 5000; // 5 seconds
  }

  /**
   * Call Claude AI for multi-agent decision making
   * Falls back to rule-based signals if no API key
   */
  async callClaudeAI(marketData, botConfig) {
    if (!this.anthropicKey) {
      console.warn('⚠️ No Anthropic API key. Using fallback rule-based signals.');
      return this.generateRuleBasedSignals(marketData, botConfig);
    }

    try {
      const prompt = this.buildAgentPrompt(marketData, botConfig);
      
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'x-api-key': this.anthropicKey,
          'anthropic-version': '2023-06-01',
          'content-type': 'application/json'
        },
        body: JSON.stringify({
          model: 'claude-3-5-sonnet-20241022',
          max_tokens: 1024,
          messages: [{
            role: 'user',
            content: prompt
          }]
        })
      });

      if (!response.ok) {
        throw new Error(`Claude API error: ${response.status}`);
      }

      const data = await response.json();
      return this.parseClaudeResponse(data.content[0].text);
    } catch (error) {
      console.error('Claude API failed:', error);
      return this.generateRuleBasedSignals(marketData, botConfig);
    }
  }

  /**
   * Build prompt for Claude agents
   */
  buildAgentPrompt(marketData, botConfig) {
    return `You are a quantitative trading AI. Analyze this market data and vote LONG, SHORT, or HOLD.

Market Data:
- Symbol: ${marketData.symbol}
- Current Price: $${marketData.currentPrice}
- 24h High: $${marketData.high24h}
- 24h Low: $${marketData.low24h}
- Volume: ${marketData.volume}
- Change %: ${marketData.changePercent}%
- RSI: ${marketData.rsi}
- MACD: ${marketData.macd}

Bot Personality: ${botConfig.personality}
Risk Tolerance: ${botConfig.riskTolerance}%

Respond with JSON:
{
  "momentum_vote": "LONG|SHORT|HOLD",
  "momentum_conviction": 0.0-1.0,
  "volatility_insight": "brief explanation",
  "risk_warning": "any concerns"
}`;
  }

  /**
   * Parse Claude's response
   */
  parseClaudeResponse(text) {
    try {
      const json = JSON.parse(text);
      return {
        momentum: {
          vote: json.momentum_vote,
          conviction: json.momentum_conviction
        },
        volatility: {
          vote: this.deriveVote(json.volatility_insight),
          conviction: 0.7
        },
        riskAssessment: json.risk_warning
      };
    } catch (e) {
      console.error('Failed to parse Claude response:', e);
      return this.generateRuleBasedSignals({}, {});
    }
  }

  /**
   * Fallback: Rule-based signals (no API needed)
   */
  generateRuleBasedSignals(marketData, botConfig) {
    const rsi = marketData.rsi || 50;
    const momentum = marketData.changePercent || 0;
    
    return {
      momentum: {
        vote: rsi < 30 ? 'LONG' : rsi > 70 ? 'SHORT' : 'HOLD',
        conviction: Math.min(1, Math.abs(rsi - 50) / 50)
      },
      volatility: {
        vote: momentum > 2 ? 'LONG' : momentum < -2 ? 'SHORT' : 'HOLD',
        conviction: Math.min(1, Math.abs(momentum) / 5)
      },
      politician: {
        vote: 'HOLD',
        conviction: 0.5
      },
      sentiment: {
        vote: 'HOLD',
        conviction: 0.5
      },
      risk: {
        vote: 'HOLD',
        conviction: 0.8
      }
    };
  }

  deriveVote(text) {
    const lower = text.toLowerCase();
    if (lower.includes('buy') || lower.includes('long')) return 'LONG';
    if (lower.includes('sell') || lower.includes('short')) return 'SHORT';
    return 'HOLD';
  }

  /**
   * Fetch real-time price data from Alpaca or fallback
   */
  async getPriceData(symbol = 'EURUSD') {
    // Check cache first
    const cacheKey = `price_${symbol}`;
    if (this.priceCache.has(cacheKey)) {
      const cached = this.priceCache.get(cacheKey);
      if (Date.now() - cached.timestamp < this.priceCacheExpiry) {
        return cached.data;
      }
    }

    try {
      // Try Alpaca first (crypto quotes)
      if (this.alpacaKey) {
        const response = await fetch(
          `https://data.alpaca.markets/v1beta3/crypto/latest/bars?symbols=${symbol}`,
          {
            headers: { 'APCA-API-KEY-ID': this.alpacaKey }
          }
        );
        
        if (response.ok) {
          const data = await response.json();
          const barData = data.bars[symbol][0];
          const priceData = {
            symbol,
            currentPrice: barData.c,
            high24h: barData.h,
            low24h: barData.l,
            volume: barData.v,
            timestamp: Date.now()
          };
          
          this.priceCache.set(cacheKey, { data: priceData, timestamp: Date.now() });
          return priceData;
        }
      }
    } catch (error) {
      console.warn('Alpaca API failed, using fallback:', error);
    }

    // Fallback: synthetic data (for demo/testing)
    return this.generateSyntheticPriceData(symbol);
  }

  /**
   * Generate realistic synthetic price data for demo mode
   */
  generateSyntheticPriceData(symbol) {
    const basePrice = 45000; // ETH-like base
    const variance = (Math.random() - 0.5) * 2000;
    const currentPrice = basePrice + variance;
    
    return {
      symbol,
      currentPrice,
      high24h: currentPrice + Math.random() * 2000,
      low24h: currentPrice - Math.random() * 2000,
      volume: Math.random() * 1000000,
      changePercent: (Math.random() - 0.5) * 10,
      rsi: 30 + Math.random() * 40,
      macd: Math.random() - 0.5,
      timestamp: Date.now()
    };
  }
}

// Global API instance
window.tradeAPI = new TradeArenaAPI();
</script>
