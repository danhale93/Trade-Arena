<!-- NEW: Supabase Status Indicator -->
<div id="supabaseStatus" style="position:fixed;bottom:10px;right:10px;font-size:9px;color:var(--dim);z-index:9999">
  🔌 Supabase: <span id="sbStatus">Loading...</span>
</div>

<script type="module">
// Load modules with Supabase first
await import('./wallet.js');
await import('./real-wallet.js');

// Auto-init wallet on load (FIX #1)
window.addEventListener('load', async () => {
  if (window.ethereum?.selectedAddress) {
    await connectWallet();
  }
  // Init Supabase status
  await initSupabaseStatus();
});

// Supabase helper
async function initSupabaseStatus() {
  try {
    const { data: { session } } = await supabase.auth.getSession();
    const statusEl = document.getElementById('sbStatus');
    if (statusEl) {
      statusEl.textContent = session ? 'Connected' : 'Anon mode';
      statusEl.style.color = session ? 'var(--green)' : 'var(--cyan)';
    }
    console.log('✅ Supabase ready');
  } catch(e) {
    console.error('Supabase init failed:', e);
    document.getElementById('sbStatus').textContent = 'Config needed';
    document.getElementById('sbStatus').style.color = 'var(--hot)';
  }
}

// FIXED connectWallet - uses real-wallet.js
async function connectWallet() {
  try {
    console.log('🔗 Connecting real wallet...');
    
    // Use real-wallet.js init
    await initializeRealWalletMode();
    await switchToBaseNetwork();
    
    // Connect & get live balance
    const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
    walletState.address = accounts[0];
    walletState.provider = new ethers.providers.Web3Provider(window.ethereum);
    walletState.signer = walletState.provider.getSigner();
    
    // Live balance update
    const balance = await getWalletBalance();
    if (balance) {
      userBalance = balance.eth;
      document.getElementById('walletBalance').textContent = `${balance.eth.toFixed(4)} ETH ($${balance.usd.toFixed(0)})`;
      document.getElementById('userAddr').textContent = walletState.address.slice(0, 6) + '...' + walletState.address.slice(-4);
    }
    
    if (await validateNetwork(walletState.provider)) {
      showToast('✅ Connected to Base Mainnet', 'success');
      loginSuccess();
    } else {
      showToast('❌ Switch to Base Mainnet first', 'error');
    }
  } catch (error) {
    console.error('Real wallet connection failed:', error);
    showToast('Wallet connection failed', 'error');
  }
}

// Log trades to Supabase
async function logTradeToSupabase(trade) {
  if (!supabase) return;
  const { data, error } = await supabase
    .from('trades')
    .insert([trade]);
  if (error) console.error('Supabase log error:', error);
  else console.log('✅ Trade logged to Supabase');
}

// In spinBot - after trade closes:
window.logTrade = logTradeToSupabase; // expose globally for app.js

</script>
