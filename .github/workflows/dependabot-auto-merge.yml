name: Auto-merge Dependabot PRs

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
  workflow_run:
    types:
      - completed
    workflows: ["*"]  # Trigger when any workflow completes

permissions:
  contents: write
  pull-requests: write
  statuses: read
  checks: read

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Check if PR is ready to merge
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request?.number || context.payload.workflow_run?.pull_requests?.[0]?.number;
            if (!prNumber) {
              console.log('No PR found in payload');
              core.setOutput('ready', 'false');
              return;
            }
            
            // Check if PR is mergeable
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber
            });
            
            console.log('PR Title:', pr.data.title);
            console.log('PR State:', pr.data.mergeable_state);
            console.log('Mergeable:', pr.data.mergeable);
            
            if (pr.data.mergeable_state === 'clean') {
              console.log('PR is clean and ready to merge');
              core.setOutput('pr_number', prNumber);
              core.setOutput('ready', 'true');
            } else {
              console.log('PR not ready. State:', pr.data.mergeable_state);
              core.setOutput('ready', 'false');
            }
          result-encoding: json

      - name: Auto-merge PR
        if: steps.check.outputs.ready == 'true'
        run: |
          echo "Auto-merging PR #${{ steps.check.outputs.pr_number }}"
          gh pr merge ${{ steps.check.outputs.pr_number }} --admin --merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Report status
        if: steps.check.outputs.ready != 'true'
        run: |
          echo "PR not ready for auto-merge. Will retry when CI checks complete."