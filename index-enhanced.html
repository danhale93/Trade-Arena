<!-- ENHANCED VERSION WITH BALANCE DISPLAY, COUNTDOWN TIMER, & QUEUE POSITION -->
<!-- Add this CSS to the <style> section after the existing .global-header styles -->

<style>
/* ══ STICKY TOP BAR WITH BALANCE & TIMER ══ */
.sticky-top-bar {
  position: fixed;
  top: 4px;
  left: 0;
  right: 0;
  z-index: 9998;
  background: linear-gradient(180deg, rgba(6,3,10,0.95), rgba(6,3,10,0.85));
  backdrop-filter: blur(8px);
  border-bottom: 2px solid var(--gold2);
  padding: 8px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 20px;
  flex-wrap: wrap;
  box-shadow: 0 4px 20px rgba(0,0,0,0.6);
}

.stb-section {
  display: flex;
  align-items: center;
  gap: 12px;
}

.stb-label {
  font-size: 9px;
  color: var(--dim);
  text-transform: uppercase;
  letter-spacing: 2px;
  font-family: 'Oswald', sans-serif;
}

.stb-value {
  font-size: 16px;
  font-weight: bold;
  font-family: 'Oswald', sans-serif;
  letter-spacing: 1px;
}

.stb-balance {
  color: var(--gold2);
  text-shadow: 0 0 12px rgba(255,170,0,0.4);
  min-width: 140px;
}

.stb-pnl-pos {
  color: var(--green);
  text-shadow: 0 0 12px rgba(57,255,20,0.4);
  min-width: 120px;
}

.stb-pnl-neg {
  color: var(--hot);
  text-shadow: 0 0 12px rgba(255,45,120,0.4);
  min-width: 120px;
}

.stb-timer {
  display: flex;
  flex-direction: column;
  align-items: center;
  background: rgba(191,95,255,0.08);
  border: 2px solid rgba(191,95,255,0.3);
  border-radius: 8px;
  padding: 6px 12px;
  min-width: 110px;
}

.stb-timer-label {
  font-size: 7px;
  color: var(--purple);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 2px;
}

.stb-timer-value {
  font-size: 18px;
  font-weight: bold;
  color: var(--cyan);
  font-family: 'Share Tech Mono', monospace;
  text-shadow: 0 0 10px rgba(0,255,231,0.5);
  animation: timer-pulse 1s ease infinite;
}

@keyframes timer-pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.7; }
}

.stb-queue {
  display: flex;
  flex-direction: column;
  align-items: center;
  background: rgba(68,136,255,0.08);
  border: 2px solid rgba(68,136,255,0.3);
  border-radius: 8px;
  padding: 6px 12px;
  min-width: 100px;
}

.stb-queue-label {
  font-size: 7px;
  color: var(--blue);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 2px;
}

.stb-queue-value {
  font-size: 20px;
  font-weight: bold;
  color: var(--blue);
  font-family: 'Oswald', sans-serif;
  text-shadow: 0 0 10px rgba(68,136,255,0.5);
}

.stb-queue-position {
  font-size: 8px;
  color: var(--dim);
  margin-top: 2px;
}

/* Adjust main content top margin */
#mainApp {
  margin-top: 60px !important;
}

/* Mobile responsive */
@media(max-width: 768px) {
  .sticky-top-bar {
    flex-direction: column;
    padding: 6px 12px;
    gap: 10px;
  }
  
  .stb-section {
    width: 100%;
    justify-content: center;
  }
  
  .stb-value {
    font-size: 14px;
  }
}
</style>

<!-- Add this HTML right after <div class="edge"></div> and before #connectScreen -->

<div class="sticky-top-bar" id="stickyTopBar" style="display: none;">
  <!-- Account Balance Section -->
  <div class="stb-section">
    <div>
      <div class="stb-label">💰 ACCOUNT BALANCE</div>
      <div class="stb-value stb-balance" id="stickyBalance">$10,000.00</div>
    </div>
  </div>
  
  <!-- P&L Section -->
  <div class="stb-section">
    <div>
      <div class="stb-label">📈 SESSION P&L</div>
      <div class="stb-value stb-pnl-pos" id="stickyPnl">+$0.00</div>
    </div>
  </div>
  
  <!-- Countdown Timer to Next Trade Close -->
  <div class="stb-timer">
    <div class="stb-timer-label">⏱️ NEXT EXIT</div>
    <div class="stb-timer-value" id="stickyCountdown">--:--</div>
  </div>
  
  <!-- Queue Position -->
  <div class="stb-queue">
    <div class="stb-queue-label">📍 QUEUE POS</div>
    <div class="stb-queue-value" id="stickyQueueNum">—</div>
    <div class="stb-queue-position" id="stickyQueueDetail">—</div>
  </div>
</div>

<!-- Add this JavaScript to the main script section (after config, before functions) -->

<script>
// ══════════════════════════════════════════════════════
// STICKY TOP BAR SYSTEM
// ══════════════════════════════════════════════════════

let stickyUpdateInterval = null;
let nextExitTime = null;
let queuedTradesCount = 0;

function showStickyBar() {
  const bar = document.getElementById('stickyTopBar');
  if (bar) bar.style.display = 'flex';
}

function hideStickyBar() {
  const bar = document.getElementById('stickyTopBar');
  if (bar) bar.style.display = 'none';
}

function updateStickyBar() {
  const balanceEl = document.getElementById('stickyBalance');
  const pnlEl = document.getElementById('stickyPnl');
  const countdownEl = document.getElementById('stickyCountdown');
  const queueEl = document.getElementById('stickyQueueNum');
  const queueDetailEl = document.getElementById('stickyQueueDetail');
  
  if (!balanceEl) return;
  
  // Update balance
  balanceEl.textContent = `$${balance.toFixed(2)}`;
  
  // Update P&L
  const pnlClass = totalPnl >= 0 ? 'stb-pnl-pos' : 'stb-pnl-neg';
  pnlEl.textContent = `${totalPnl >= 0 ? '+' : ''}$${totalPnl.toFixed(2)}`;
  pnlEl.className = 'stb-value ' + pnlClass;
  
  // Update countdown timer
  updateCountdown(countdownEl);
  
  // Update queue position
  updateQueuePosition(queueEl, queueDetailEl);
}

function updateCountdown(el) {
  if (!el) return;
  
  // Find nearest trade with open position
  const now = Date.now();
  let nearestExitTime = null;
  let nearestBot = null;
  
  for (let bot of bots) {
    if (bot.openPosition) {
      const exitTime = bot.openPosition.entryTime + (EXIT_TIMES[bot.openPosition.method] || 300000);
      if (!nearestExitTime || exitTime < nearestExitTime) {
        nearestExitTime = exitTime;
        nearestBot = bot;
      }
    }
  }
  
  if (nearestExitTime) {
    const msRemaining = Math.max(0, nearestExitTime - now);
    const seconds = Math.floor((msRemaining / 1000) % 60);
    const minutes = Math.floor((msRemaining / 60000) % 60);
    const hours = Math.floor(msRemaining / 3600000);
    
    let display = '';
    if (hours > 0) {
      display = `${hours}h ${minutes}m`;
    } else if (minutes > 0) {
      display = `${minutes}m ${seconds}s`;
    } else {
      display = `${seconds}s`;
      el.style.color = msRemaining < 10000 ? 'var(--hot)' : 'var(--cyan)';
    }
    
    el.textContent = display;
    
    // Add pulsing effect when close to exit
    if (msRemaining < 5000) {
      el.parentElement.style.animation = 'none';
      setTimeout(() => {
        el.parentElement.style.animation = 'timer-pulse 0.3s ease infinite';
      }, 10);
    }
  } else {
    el.textContent = '--:--';
    el.style.color = 'var(--cyan)';
  }
}

function updateQueuePosition(queueEl, queueDetailEl) {
  if (!queueEl || !queueDetailEl) return;
  
  // Count queued/pending trades
  let queued = 0;
  let executing = 0;
  
  for (let bot of bots) {
    if (bot.isThinking) executing++;
    if (bot.queuedTrade) queued++;
  }
  
  queuedTradesCount = queued + executing;
  
  if (queuedTradesCount === 0) {
    queueEl.textContent = '—';
    queueDetailEl.textContent = 'idle';
  } else {
    queueEl.textContent = queuedTradesCount;
    const detail = executing > 0 ? `${executing} exec, ${queued} wait` : `${queued} waiting`;
    queueDetailEl.textContent = detail;
  }
}

// Start sticky bar updates when main app loads
function initStickyBar() {
  if (stickyUpdateInterval) clearInterval(stickyUpdateInterval);
  
  stickyUpdateInterval = setInterval(() => {
    updateStickyBar();
  }, 250); // Update 4x per second for smooth countdown
  
  showStickyBar();
}

// Stop sticky bar updates
function stopStickyBar() {
  if (stickyUpdateInterval) {
    clearInterval(stickyUpdateInterval);
    stickyUpdateInterval = null;
  }
  hideStickyBar();
}

// Wrap existing setupApp to start sticky bar
const originalSetupApp = window.setupApp;
window.setupApp = function(profile) {
  originalSetupApp(profile);
  initStickyBar();
};

// Wrap globalKill to stop sticky bar
const originalGlobalKill = window.globalKill;
window.globalKill = function() {
  originalGlobalKill();
  stopStickyBar();
};
</script>

<!-- END ENHANCEMENTS -->
