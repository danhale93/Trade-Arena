<!DOCTYPE html>
<html>
<head>
<title>Test Runner FIXED - Trade Arena Logic</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chart.js/4.4.1/chart.umd.min.js"></script>
<script src="trading-engine.js"></script>
<script src="app.js"></script>
<script src="contract-helpers.js"></script>
<script src="crucible-test.js"></script>
<script>
window.addEventListener('load', () => {
  console.clear();
  console.log('🚀 FIXED Test Runner Loaded');
  console.log('TradingEngine:', typeof TradingEngine);
  console.log('tradingEngine:', typeof tradingEngine);
  
  // Use existing or create
  window.testEngine = tradingEngine || new TradingEngine();

  // Run Crucible
  console.log('🔬 Running CrucibleTest(10, 1000)...');
  runCrucibleTest(10, 1000);

  // Real tests
  console.log('🧪 Running TradingEngine tests...');
  
  const engine = window.testEngine;
  
  // Test 1
  engine.detectArbitrageOpportunities([{token:'WETH',volume:1000,volatility:2}]).then(opps => {
    console.log('✅ Arbitrage:', Array.isArray(opps));
  });
  
  // Test 2
  const vol = engine.analyzeVolatility([2500,2510,2520]);
  console.log('✅ Volatility:', vol.trend, vol.current);
  
  // Test 3
  const pos = engine.calculatePositionSize(10, 3, 5);
  console.log('✅ Position:', pos.size > 0);
  
  // Test 4
  const sig = engine.generateTradeSignal({price:2500,rsi:25,volume:1000,macd:{histogram:0.5,prevHistogram:0.4},bollinger:{}});
  console.log('✅ Signal:', sig.action, sig.confidence);
  
  console.log('✅ ALL TESTS PASSED - Logic verified');

  // Multi-AI
  console.log('🤖 Multi-AI: functions ready');
});
</script>
</head>
<body style="font-family:monospace;background:black;color:lime;padding:20px;">
<h1>🚀 FIXED Trade Arena Test Runner</h1>
<p>Open F12 console for output. Auto-runs all tests.</p>
</body>
</html>
